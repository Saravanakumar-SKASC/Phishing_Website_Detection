data:
  file_path: "data/phising.csv"
  target_column: "Result"
  test_size: 0.2
  random_state: 42

artifacts:
  directory: "artifacts"
  scaler_filename: "scaler.pkl"
  xgb_model_filename: "xgb_model.pkl"
  ann_model_filename: "ann_mlp_model.pkl"
  tabnet_model_prefix: "tabnet_model"
  rf_model_filename: "rf_model.pkl"
  lgbm_model_filename: "lgbm_model.pkl"
  svm_model_filename: "svm_model.pkl"
  stack_model_filename: "stacking_model.pkl"

scaler:
  type: "StandardScaler"

xgboost:
  n_estimators: 400
  max_depth: 7
  learning_rate: 0.04
  subsample: 0.9
  colsample_bytree: 0.9
  gamma: 0.2
  min_child_weight: 3
  reg_alpha: 0.3
  reg_lambda: 1.0
  scale_pos_weight: 1
  n_jobs: -1
  eval_metric: "logloss"

mlp:
  hidden_layers: [128, 64, 32]
  activation: "relu"
  solver: "adam"
  learning_rate_init: 0.001
  alpha: 0.0005
  batch_size: 64
  max_iter: 400
  early_stopping: true
  validation_fraction: 0.1

# ========================
# TabNet CONFIG (Novel: Attention-based Tabular DL)
# ========================
tabnet:
  n_d: 32           # width of decision step output
  n_a: 32           # width of attention embedding (must equal n_d)
  n_steps: 5        # number of sequential attention steps
  gamma: 1.3        # feature reuse coefficient (1.0 = no reuse, 2.0 = max reuse)
  lambda_sparse: 1.0e-4  # sparsity regularization strength
  momentum: 0.02
  epsilon: 1.0e-15
  seed: 42
  max_epochs: 200
  patience: 20
  batch_size: 256
  virtual_batch_size: 128

# ========================
# Random Forest CONFIG
# ========================
random_forest:
  n_estimators: 500
  max_depth: 15
  min_samples_split: 5
  min_samples_leaf: 2
  max_features: "sqrt"
  random_state: 42
  n_jobs: -1
  class_weight: "balanced"

# ========================
# LightGBM CONFIG
# ========================
lightgbm:
  n_estimators: 400
  max_depth: 7
  learning_rate: 0.04
  subsample: 0.9
  colsample_bytree: 0.9
  reg_alpha: 0.3
  reg_lambda: 1.0
  num_leaves: 63
  min_child_samples: 20
  random_state: 42
  n_jobs: -1
  verbose: -1